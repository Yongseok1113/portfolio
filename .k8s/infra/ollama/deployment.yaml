# Ollama — RTX 3060 Laptop GPU (6GB VRAM)
# Image: ollama/ollama:0.9.4 (2025-06-29 기준 stable)
# runtimeClassName 제거 — Minikube nvidia-device-plugin 방식 사용
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: portfolio-infra
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.9.4
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc